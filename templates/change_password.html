{% extends "base.html" %}
{% block title %}Change Password — Alexander AI Agent{% endblock %}
{% block content %}
<div class="container-sm" style="padding-top:3rem;">
  <div class="card">
    <a href="/dashboard" style="color:#6b7280;font-size:0.88rem;">← Back to dashboard</a>
    <h1 style="font-size:1.4rem;font-weight:800;margin:0.75rem 0 1.5rem;">🔑 Change Password</h1>
    <form method="POST" action="/change-password" autocomplete="on">
      <div class="form-group">
        <label>Current Password</label>
        <div class="eye-wrap">
          <input type="password" name="current_password" id="current_password" autocomplete="current-password" required>
          <button type="button" class="eye-btn">👁️</button>
        </div>
      </div>
      <div class="form-group">
        <label>New Password</label>
        <div class="eye-wrap">
          <input type="password" name="new_password" id="new_password" autocomplete="new-password" required minlength="8">
          <button type="button" class="eye-btn">👁️</button>
        </div>
      </div>
      <div class="form-group">
        <label>Confirm New Password</label>
        <div class="eye-wrap">
          <input type="password" name="confirm_password" id="confirm_password" autocomplete="new-password" required minlength="8">
          <button type="button" class="eye-btn">👁️</button>
        </div>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;">Update Password</button>
    </form>
  </div>
</div>
{% endblock %}

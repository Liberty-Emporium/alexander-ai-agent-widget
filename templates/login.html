{% extends "base.html" %}
{% block title %}Login — Alexander AI Agent{% endblock %}
{% block content %}
<div class="container-sm" style="padding-top:3rem;">
  <div class="card">
    <h1 style="font-size:1.5rem;font-weight:800;margin-bottom:0.25rem;">Welcome back</h1>
    <p style="color:#6b7280;font-size:0.9rem;margin-bottom:1.5rem;">Sign in to your account.</p>
    <form method="POST" action="/login" autocomplete="on">
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" name="email" id="email" autocomplete="email" placeholder="you@example.com" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <div class="eye-wrap">
          <input type="password" name="password" id="password" autocomplete="current-password" placeholder="Your password" required>
          <button type="button" class="eye-btn">👁️</button>
        </div>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:11px;">Sign In →</button>
    </form>
    <p style="text-align:center;margin-top:1.25rem;font-size:0.88rem;color:#6b7280;">
      Don't have an account? <a href="/signup" style="color:#6366f1;">Sign up free</a>
    </p>
  </div>
</div>
{% endblock %}
